catalogMode: prefer
ignoreWorkspaceRootCheck: true
shamefullyHoist: true
strictPeerDependencies: false

packages:
  - packages/*

allowBuilds:
  esbuild: true
  simple-git-hooks: true

catalog:
  '@antfu/eslint-config': ^8.2.0
  eslint: ^10.2.1
  simple-git-hooks: ^2.13.1
  tsdown: ^0.21.10
  typescript: ^6.0.2
  vitest: ^4.1.5

catalogs:
  types:
    '@types/node': ^24.0.0
